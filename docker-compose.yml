# ASSE ZERO — Docker Compose: MySQL 8 + microservizi cataloghi + auth (JWT) + SPA (nginx gateway).
# Primo avvio: MySQL esegue gli script in docker/mysql/init (schema + seed).
# UI/API gateway: http://localhost:8080
# Produzione Raspberry/ngrok: esporre solo web:8080. MySQL e microservizi restano nella rete Docker.
#
# Avvio: docker compose up --build
# Reset DB (ATTENZIONE: cancella i dati): docker compose down -v

x-db-env: &db-env
  MYSQL_HOST: mysql
  MYSQL_PORT: "3306"
  MYSQL_USER: ${MYSQL_USER:-assezero}
  MYSQL_PASSWORD: ${MYSQL_PASSWORD:-appsecret}

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      # MySQL auto-creates this user with GRANT ALL on first init
      MYSQL_USER: ${MYSQL_USER:-assezero}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-appsecret}
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\""]
      interval: 5s
      timeout: 5s
      retries: 25
      start_period: 20s

  photo-service:
    build:
      context: ./backend
      dockerfile: photo-service/Dockerfile
    environment:
      <<: *db-env
      PORT: "4001"
      MYSQL_DATABASE: photos_svc
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
    volumes:
      - media-uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  video-service:
    build:
      context: ./backend
      dockerfile: video-service/Dockerfile
    environment:
      <<: *db-env
      PORT: "4002"
      MYSQL_DATABASE: videos_svc
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
    volumes:
      - media-uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    environment:
      <<: *db-env
      PORT: "4003"
      MYSQL_DATABASE: auth_svc
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@assezero.local}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin_dev_change_me}
      DEFAULT_EDITOR_EMAIL: ${DEFAULT_EDITOR_EMAIL:-editor@assezero.local}
      DEFAULT_EDITOR_PASSWORD: ${DEFAULT_EDITOR_PASSWORD:-editor_dev_change_me}
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "8080:80"
    volumes:
      - media-uploads:/usr/share/nginx/html/uploads
    depends_on:
      photo-service:
        condition: service_started
      video-service:
        condition: service_started
      auth-service:
        condition: service_started

volumes:
  mysql-data:
  media-uploads:
