server {
    listen 80;
    server_name gerardoromani.it www.gerardoromani.it;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gerardoromani.it www.gerardoromani.it;

    ssl_certificate     /etc/letsencrypt/live/gerardoromani.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gerardoromani.it/privkey.pem;

    root /var/www/gerardoromani/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — every route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
