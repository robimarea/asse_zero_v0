server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 1g;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location /api/photos {
        rewrite ^/api/photos(.*)$ /photos$1 break;
        proxy_pass http://photo-service:4001;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_read_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/videos {
        proxy_pass http://video-service:4002/videos;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_read_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/auth/ {
        proxy_pass http://auth-service:4003/;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_read_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        access_log off;
    }

    location = /health {
        default_type application/json;
        return 200 "{\"ok\":true,\"service\":\"web-gateway\"}\n";
    }

    # Cache static assets with hashes in their filenames
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Do not cache index.html to ensure clients always get the latest build references
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
