server {
    listen 80;
    server_name localhost;
    # This container is only the API gateway. The SPA is served by Vercel.

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location /api/photos {
        rewrite ^/api/photos(.*)$ /photos$1 break;
        proxy_pass http://photo-service:4001;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/videos {
        proxy_pass http://video-service:4002/videos;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/auth/ {
        proxy_pass http://auth-service:4003/;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        access_log off;
    }

    location = /health {
        default_type application/json;
        return 200 "{\"ok\":true,\"service\":\"api-gateway\"}\n";
    }

    location / {
        default_type application/json;
        return 404 "{\"error\":\"Backend API only. Frontend is served by Vercel.\"}\n";
    }
}
