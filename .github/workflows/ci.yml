name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ----------------------------------------------------
  # JOB 1: Controlli di Qualità e Build (CI)
  # ----------------------------------------------------
  code-quality-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            backend/auth-service/package-lock.json
            backend/photo-service/package-lock.json
            backend/video-service/package-lock.json

      # --- CONTROLLI FRONTEND ---
      - name: Installazione Dipendenze Frontend
        run: npm ci --prefix frontend

      - name: Verifica Build Frontend
        run: npm run build --prefix frontend

      # --- CONTROLLI BACKEND ---
      - name: Installazione Dipendenze Auth-Service
        run: npm ci --prefix backend/auth-service

      - name: Installazione Dipendenze Photo-Service
        run: npm ci --prefix backend/photo-service

      - name: Installazione Dipendenze Video-Service
        run: npm ci --prefix backend/video-service

      # --- CONTROLLO DOCKER ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validazione Build Docker Compose
        run: docker compose build

  # ----------------------------------------------------
  # JOB 2: Deployment Automatico su VPS (CD)
  # Viene eseguito solo sul branch principale se la CI passa
  # ----------------------------------------------------
  deploy:
    needs: code-quality-and-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Connessione alla rete Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy su VPS via SSH (tramite Tailscale)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}       # IP Tailscale del Raspberry (es. 100.x.x.x)
          username: ${{ secrets.VPS_USER }}   # Es: pi o tomas
          key: ${{ secrets.SSH_PRIVATE_KEY }} # Chiave SSH privata nei secrets di GitHub
          port: 22
          script: |
            set -e

            PROJECT_DIR="$HOME/Evoluzione_software/asse_zero_v0"

            # Clona il repo se non esiste ancora, altrimenti fa pull
            if [ ! -d "$PROJECT_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$PROJECT_DIR"
            fi

            cd "$PROJECT_DIR"
            git pull origin main

            # Controlla che il file .env esista (va creato manualmente sul Raspberry la prima volta)
            if [ ! -f ".env" ]; then
              echo "❌ ERRORE: file .env mancante in $PROJECT_DIR. Crealo manualmente sul Raspberry."
              exit 1
            fi

            # Aggiorna i container (build e riavvio)
            docker compose up -d --build

            # Rimuove immagini vecchie per liberare spazio (importante sul Raspberry)
            docker image prune -f
