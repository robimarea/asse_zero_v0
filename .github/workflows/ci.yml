name: CI — Build & Quality Check

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ----------------------------------------------------
  # Controlli di Qualità e Build
  # ----------------------------------------------------
  code-quality-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            backend/auth-service/package-lock.json
            backend/photo-service/package-lock.json
            backend/video-service/package-lock.json

      # --- CONTROLLI FRONTEND ---
      - name: Installazione Dipendenze Frontend
        run: npm ci --prefix frontend

      - name: Verifica Build Frontend
        run: npm run build --prefix frontend

      # --- CONTROLLI BACKEND ---
      - name: Installazione Dipendenze Auth-Service
        run: npm ci --prefix backend/auth-service

      - name: Installazione Dipendenze Photo-Service
        run: npm ci --prefix backend/photo-service

      - name: Installazione Dipendenze Video-Service
        run: npm ci --prefix backend/video-service

      # --- CONTROLLO DOCKER ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validazione Build Docker Compose
        run: docker compose build
