name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ----------------------------------------------------
  # JOB 1: Controlli di Qualità e Build (CI)
  # ----------------------------------------------------
  code-quality-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            backend/auth-service/package-lock.json
            backend/photo-service/package-lock.json
            backend/video-service/package-lock.json

      # --- CONTROLLI FRONTEND ---
      - name: Installazione Dipendenze Frontend
        run: npm ci --prefix frontend

      - name: Verifica Build Frontend
        run: npm run build --prefix frontend

      # --- CONTROLLI BACKEND ---
      - name: Installazione Dipendenze Auth-Service
        run: npm ci --prefix backend/auth-service

      - name: Installazione Dipendenze Photo-Service
        run: npm ci --prefix backend/photo-service

      - name: Installazione Dipendenze Video-Service
        run: npm ci --prefix backend/video-service

      # --- CONTROLLO DOCKER ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validazione Build Docker Compose
        run: docker compose build

  # ----------------------------------------------------
  # JOB 2: Deployment Automatico su VPS (CD)
  # Viene eseguito solo sul branch principale se la CI passa
  # ----------------------------------------------------
  deploy:
    needs: code-quality-and-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy su VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}       # IP della VPS Aruba
          username: ${{ secrets.VPS_USER }}   # Es: root
          key: ${{ secrets.SSH_PRIVATE_KEY }} # Chiave SSH privata salvata nei secrets di GitHub
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Naviga nella cartella del progetto sulla VPS
            cd /var/www/asse_zero_v0 || cd /home/tomas/asse_zero_v0
            
            # Scarica l'ultimo codice da GitHub
            git pull origin main
            
            # Aggiorna i container (build e riavvio in background)
            docker compose up -d --build
            
            # Sfoltisce le immagini Docker vecchie non utilizzate per liberare spazio
            docker image prune -f
