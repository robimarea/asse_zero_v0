# docker-compose per avviare video-service in isolamento (sviluppo standalone).
# Per l'intero stack usa il docker-compose.yml nella root del progetto.
# Copia ../../.env.example in ../../.env e compila le variabili prima di avviare.

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret_dev_only}
      MYSQL_USER: ${MYSQL_USER:-assezero}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-appsecret_dev_only}
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data-video:/var/lib/mysql
      - ../../docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\""]
      interval: 5s
      timeout: 5s
      retries: 25
      start_period: 20s

  video-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: "4002"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER:-assezero}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-appsecret_dev_only}
      MYSQL_DATABASE: videos_svc
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data-video:
